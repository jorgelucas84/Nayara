<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Urbano - Cidade 10k</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f0f2f5;
            color: #333;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 800px;
            margin: auto;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h1 { color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        h2 { color: #34495e; margin-top: 25px; font-size: 1.2rem; }

        .input-group {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 10px;
            align-items: center;
            margin-bottom: 15px;
            padding: 10px;
            border-bottom: 1px solid #fafafa;
        }

        .input-group label { font-weight: bold; }

        input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            margin-top: 25px;
            padding: 15px;
            font-size: 18px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover { background-color: #219150; }

        .result {
            margin-top: 30px;
            padding: 20px;
            background: #e8f4ff;
            border-left: 5px solid #3498db;
            border-radius: 4px;
            display: none; /* Escondido até calcular */
        }

        .result b { color: #2980b9; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>Simulador Urbano</h1>
    <p>Simulação baseada em uma população de 10.000 habitantes.</p>

    <h2>Edificações (Qtd | Largura | Profundidade)</h2>
    
    <div class="input-group">
        <span>Até 5m:</span>
        <input type="number" id="n1" placeholder="Qtd">
        <input type="number" id="w1" placeholder="L (m)">
        <input type="number" id="d1" placeholder="P (m)">
    </div>

    <div class="input-group">
        <span>Até 20m:</span>
        <input type="number" id="n2" placeholder="Qtd">
        <input type="number" id="w2" placeholder="L (m)">
        <input type="number" id="d2" placeholder="P (m)">
    </div>

    <div class="input-group">
        <span>Até 50m:</span>
        <input type="number" id="n3" placeholder="Qtd">
        <input type="number" id="w3" placeholder="L (m)">
        <input type="number" id="d3" placeholder="P (m)">
    </div>

    <div class="input-group">
        <span>> 50m:</span>
        <input type="number" id="n4" placeholder="Qtd">
        <input type="number" id="w4" placeholder="L (m)">
        <input type="number" id="d4" placeholder="P (m)">
    </div>

    <h2>Parâmetros Ambientais</h2>
    <div style="display: flex; gap: 20px;">
        <div style="flex: 1;">
            <label>Taxa permeável (%):</label>
            <input type="number" id="perm" value="20">
        </div>
        <div style="flex: 1;">
            <label>Número de árvores:</label>
            <input type="number" id="trees" value="500">
        </div>
    </div>

    <button onclick="simular()">Calcular Impacto Urbano</button>

    <div class="result" id="resultado"></div>
</div>

<script>
    function getVal(id) {
        const val = document.getElementById(id).value;
        return parseFloat(val) || 0;
    }

    function simular() {
        // Coleta de dados
        let n1 = getVal("n1"), w1 = getVal("w1"), d1 = getVal("d1");
        let n2 = getVal("n2"), w2 = getVal("w2"), d2 = getVal("d2");
        let n3 = getVal("n3"), w3 = getVal("w3"), d3 = getVal("d3");
        let n4 = getVal("n4"), w4 = getVal("w4"), d4 = getVal("d4");

        let permeabilidade = getVal("perm") / 100;
        let arvores = getVal("trees");
        let pop = 10000;

        // Cálculos de Área
        let A1 = n1 * w1 * d1;
        let A2 = n2 * w2 * d2;
        let A3 = n3 * w3 * d3;
        let A4 = n4 * w4 * d4;

        let areaConstruida = A1 + A2 + A3 + A4;
        
        // Evitar divisão por zero se a permeabilidade for 100%
        let divisor = (1 - permeabilidade) <= 0 ? 0.01 : (1 - permeabilidade);
        let areaCidade = areaConstruida / divisor;

        // Se não houver área construída, a área da cidade não pode ser calculada assim
        if (areaConstruida === 0) {
            alert("Por favor, insira pelo menos uma edificação.");
            return;
        }

        let densidade = pop / areaCidade;
        let areaPermeavel = areaCidade * permeabilidade;
        let indiceVegetacao = arvores / areaCidade;

        // Modelo de temperatura (Ilha de Calor)
        let deltaT = (5 * (1 - permeabilidade)) + (0.0005 * densidade) - (0.1 * indiceVegetacao);

        // Exibir resultados
        const resDiv = document.getElementById("resultado");
        resDiv.style.display = "block";
        resDiv.innerHTML = `
            <b>📊 Resultados da Simulação:</b><br><br>
            🏠 <b>Área Construída:</b> ${areaConstruida.toLocaleString()} m²<br>
            🏙️ <b>Área Total Estimada:</b> ${areaCidade.toLocaleString(undefined, {maximumFractionDigits: 2})} m²<br>
            🌱 <b>Área Permeável:</b> ${areaPermeavel.toLocaleString(undefined, {maximumFractionDigits: 2})} m²<br>
            👥 <b>Densidade Urbana:</b> ${densidade.toFixed(4)} hab/m²<br>
            🌳 <b>Índice de Vegetação:</b> ${indiceVegetacao.toFixed(4)} árv/m²<br>
            🔥 <b>Aumento de Temp. Estimado (ΔT):</b> ${deltaT.toFixed(2)} °C
        `;
    }
</script>

</body>
</html>
